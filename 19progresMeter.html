<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress dan Meter HTML</title>
</head>

<body>

    <h1>Progress dan Meter HTML</h1>

    <!-- Progress bar -->
    <h2>Progress Bar</h2>
    <progress value="70" max="100">70%</progress>

    <!-- Meter (gauge) -->
    <h2>Meter</h2>
    <meter value="0.7" min="0" max="1"
        low="0.3" high="0.7" optimum="0.8">70%</meter>

    <!-- Details & Summary (accordion) -->
    <h2>Details & Summary</h2>
    <details>
        <summary>Klik untuk membuka</summary>
        <p>Konten tersembunyi...</p>
    </details>

    <!-- Datalist (autocomplete) -->
    <h2>Datalist</h2>
    <input list="browsers">

    <datalist id="browsers">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Safari">
    </datalist>

</body>
</html>
