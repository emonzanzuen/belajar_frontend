<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh Iframe HTML</title>
</head>
<body>

    <h1>Contoh Penggunaan Iframe</h1>

    <!-- Google Maps -->
    <h2>Google Maps</h2>

    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126743.123456789!2d106.827153!3d-6.175110!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f5e8b8b8b8b%3A0x123456789abcdef0!2sMonumen%20Nasional%20(Monas)!5e0!3m2!1sid!2sid!4v1610000000000!5m2!1sid!2sid    "
        width="600"
        height="450"
        loading="lazy">
    </iframe>


    <!-- Embed halaman lain -->
    <h2>Embed Halaman Lain</h2>

    <iframe
        src="https://contoh.com"
        width="100%"
        height="500"
        title="Deskripsi">
    </iframe>

</body>
</html>
