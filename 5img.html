<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img</title>
</head>
<body>
    <!-- Gambar dasar -->
    <img src="foto.jpg" alt="Deskripsi gambar">

    <!-- Gambar dengan ukuran -->
    <img src="foto.jpg" alt="Pemandangan" width="600" height="400">

    <!-- Gambar dari URL -->
    <img src="https://contoh.com/gambar.jpg" alt="Gambar Online">

    <!-- Gambar sebagai link -->
    <a href="https://google.com">
        <img src="logo.png" alt="Logo">
    </a>

    <!-- Gambar dengan figure & figcaption -->
    <figure>
        <img src="sunset.jpg" alt="Sunset">
        <figcaption>Pemandangan matahari terbenam</figcaption>
    </figure>

    <h3>Contoh Gambar</h3>

    <!-- Gambar dasar -->
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSV1Fus8NCSwBFWzYiLufoNDS5HqmnFzl-oXaScPC7Tw&s=10" alt="Jawa"> <br>

    <!-- Gambar dengan ukuran -->
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSV1Fus8NCSwBFWzYiLufoNDS5HqmnFzl-oXaScPC7Tw&s=10" alt="Pemandangan" width="600" height="400">

    <!-- Gambar local disk -->
    <img src="img/foto.jpg" alt="Gambar Local"> <br>

    <!-- Gambar sebagai link -->
    <a href="https://google.com">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSV1Fus8NCSwBFWzYiLufoNDS5HqmnFzl-oXaScPC7Tw&s=10" alt="Logo" width="50">
    </a>

    <!-- Gambar dengan figure & figcaption -->
    <figure>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLDOP6t2AtsZ7D40d4GQ2tbJVUZsS78NWvhx0db0W0-g&s=10" alt="Sunset">
        <figcaption>Pemandangan matahari terbenam</figcaption>
    </figure>
</body>
</html>
