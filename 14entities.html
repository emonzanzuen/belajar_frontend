<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simbol Khusus HTML</title>
</head>
<body>
    <h1>Simbol Khusus HTML</h1>

    <p>&amp; → &nbsp;&nbsp; (Ampersand)</p>
    <p>&lt; → &lt; &nbsp;&nbsp; (Less than)</p>
    <p>&gt; → &gt; &nbsp;&nbsp; (Greater than)</p>
    <p>&quot; → &quot; &nbsp;&nbsp; (Quote)</p>
    <p>&nbsp; → &nbsp;&nbsp;&nbsp;&nbsp; (Non-breaking space)</p>
    <p>&copy; → &copy; &nbsp;&nbsp; (Copyright)</p>
    <p>&reg; → &reg; &nbsp;&nbsp; (Registered)</p>
    <p>&trade; → &trade; &nbsp;&nbsp; (Trademark)</p>
    <p>&hearts; → &hearts; &nbsp;&nbsp; (Heart)</p>
    <p>&#169; → &#169; &nbsp;&nbsp; (Numerical reference)</p>
</body>
</html>
